# Dev environment config (APP_ENV=dev). Points at shared dev infrastructure.
# ${VAR:default} placeholders are expanded by the commons loaders at startup.
server:
  port: "8080"
environment: dev

telemetry:
  serviceName: onboarding-service
  otlpEndpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-eks.dev.internal}

# Auth0 JWT (internal/auth). TODO: confirm the onboarding dev Auth0 tenant values.
auth:
  enabled: ${AUTH0_ENABLED:true}
  issuer: ${AUTH0_ISSUER:}
  audience: ${AUTH0_AUDIENCE:}
  jwksUrl: ${AUTH0_JWKS_URL:}
  management:
    domain: ${AUTHENTICATION_SVC_AUTH0_DOMAIN:}
    clientId: ${AUTHENTICATION_SVC_AUTH0_MANAGEMENT_APP_CLIENT_ID:}
    clientSecret: ${AUTHENTICATION_SVC_AUTH0_MANAGEMENT_APP_CLIENT_SECRET:}
    audience: ${AUTHENTICATION_SVC_AUTH0_SUPER_M2M_AUDIENCE:}
    usernamePasswordConnectionId: ${AUTHENTICATION_SVC_AUTH0_USERNAME_PASSWORD_CONNECTION_ID:}
    ssoConnectionId: ${AUTHENTICATION_SVC_AUTH0_SSO_CONNECTION_ID:}
    ownerRoleId: ${AUTHENTICATION_SVC_AUTH0_OWNER_ROLE_ID:}

# Internal-network endpoints (Auth Service only): require a shared secret header.
internal:
  authToken: ${INTERNAL_AUTH_TOKEN:}

# Post-org provisioning (real Svix/Lago/Kong via httpclient + AWS via SDK when set).
provisioning:
  svix:
    baseUrl: ${SVIX_BASE_URL:}
    token: ${SVIX_API_TOKEN:}
  lago:
    baseUrl: ${LAGO_BASE_URL:}
    token: ${LAGO_API_TOKEN:}
  kong:
    baseUrl: ${KONG_ADMIN_URL:}
  aws:
    region: ${AWS_REGION:ap-south-1}
    usagePlanId: ${AWS_BASIC_USAGE_PLAN_ID:}

# Shared dev Apollo (see agent_docs / deployments/apollo README)
apollo:
  enabled: true
  appId: onboarding-service
  cluster: default
  namespace: application
  metaAddr: ${APOLLO_META:http://apollo-config.dev.internal}

# MongoDB — TODO: confirm the onboarding dev cluster; overridable via env.
mongoclient:
  hosts:
    - ${MONGO_HOST:mongo.dev.internal:27017}
  database: ${MONGO_DB:onboarding}
  username: ${MONGO_USERNAME:}
  password: ${MONGO_PASSWORD:}

# Shared Bureau Temporal cluster (same address/namespace as synapse-engine dev)
temporalclient:
  address: ${TEMPORAL_ADDRESS:temporal-frontend.temporal.svc.cluster.local:7233}
  namespace: ${TEMPORAL_NAMESPACE:bureau-workflow-executions}
  accountSuffix: ""
  identity: onboarding-service
  tracingEnabled: true
  tls:
    enabled: false
  worker:
    maxWorkflowTaskPollers: 4
    maxActivityTaskPollers: 4
    maxConcurrentWorkflows: 500
    maxConcurrentActivities: 500
    workflowCacheSize: 512
    disableTelemetryInterceptors: false
  metrics:
    enabled: true
  encryption:
    enabled: false
