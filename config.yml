server:
  port: ${PORT:8080}
environment: ${ENVIRONMENT:local}
telemetry:
  serviceName: ${OTEL_SERVICE_NAME:onboarding-service}
  otlpEndpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:localhost:4318}
mongoclient:
  hosts:
    - ${MONGO_HOST:localhost:27017}
  database: ${MONGO_DB:onboarding}
  username: ${MONGO_USERNAME:}
  password: ${MONGO_PASSWORD:}
apollo:
  enabled: ${APOLLO_ENABLED:true}
  appId: ${APOLLO_APP_ID:onboarding-service}
  cluster: ${APOLLO_CLUSTER:default}
  namespace: ${APOLLO_NAMESPACE:application}
  # Empty locally -> configlib runs in defaults-only mode (no Apollo server,
  # uses the seeded defaults). Set APOLLO_META to enable live hot-reload:
  #   local stack: http://localhost:8080   (see deployments/apollo)
  #   shared dev:  http://apollo-config.dev.internal
  metaAddr: ${APOLLO_META:}
