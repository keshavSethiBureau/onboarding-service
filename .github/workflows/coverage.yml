name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  # CodeAnt (disabled — repo not onboarded yet) also needs: statuses: write

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Configure Git for private Go modules
        run: |
          git config --global url."https://${{ secrets.ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set GOPRIVATE
        run: echo "GOPRIVATE=github.com/Bureau-Inc/*" >> $GITHUB_ENV

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Unit + in-memory testsuite tests run in CI; the Mongo/Temporal integration
      # tests skip automatically when those dependencies are unreachable.
      - name: Run tests with coverage (Go)
        run: |
          go test -coverprofile=coverage.out $(go list ./... | grep -v cmd/server)

      # CodeAnt (disabled — repo not onboarded to CodeAnt yet). Re-enable the steps
